<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>倪師學習網</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Serif SC', serif; background: #faf9f6; color: #1a1a1a; min-height: 100vh; }

.site-nav { padding: 0 28px; height: 56px; display: flex; align-items: center; gap: 14px; border-bottom: 0.5px solid #ddd; background: #fff; position: sticky; top: 0; z-index: 100; }
.site-title { font-size: 20px; font-weight: 700; letter-spacing: 0.06em; cursor: pointer; }
.site-title span { color: #BA7517; }
.nav-sub { font-size: 12px; color: #888; font-family: sans-serif; }
.nav-badge { margin-left: auto; font-size: 11px; font-family: sans-serif; color: #aaa; border: 0.5px solid #ddd; padding: 3px 10px; border-radius: 4px; }

.view { display: none; }
.view.active { display: block; }

.home-hero { padding: 40px 28px 26px; border-bottom: 0.5px solid #eee; }
.home-hero h1 { font-size: 32px; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 10px; }
.home-hero h1 span { color: #BA7517; }
.home-hero p { font-size: 14px; color: #666; font-family: sans-serif; line-height: 1.8; max-width: 560px; }
.subjects-section { padding: 26px 28px; }
.section-label { font-size: 11px; font-family: sans-serif; color: #aaa; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px; }
.subjects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; max-width: 920px; }
.subject-card { background: #fff; border: 0.5px solid #e5e5e5; border-radius: 12px; padding: 22px; cursor: pointer; position: relative; overflow: hidden; transition: box-shadow 0.2s, transform 0.15s; min-height: 158px; display: flex; flex-direction: column; gap: 7px; }
.subject-card:hover:not(.locked) { box-shadow: 0 4px 18px rgba(0,0,0,0.08); transform: translateY(-2px); }
.subject-card.locked { cursor: default; }
.card-char { font-size: 52px; font-weight: 700; line-height: 1; position: absolute; right: 14px; bottom: 8px; opacity: 0.06; }
.card-accent { width: 30px; height: 3px; border-radius: 2px; margin-bottom: 5px; }
.card-name { font-size: 18px; font-weight: 600; letter-spacing: 0.04em; }
.card-sub { font-size: 12px; color: #888; font-family: sans-serif; line-height: 1.6; }
.card-status { margin-top: auto; font-size: 11px; font-family: sans-serif; }
.status-live { color: #3B6D11; background: #EAF3DE; padding: 2px 9px; border-radius: 99px; }
.status-soon { color: #bbb; }

.page-nav { display: flex; align-items: center; gap: 12px; padding: 10px 20px; border-bottom: 0.5px solid #eee; background: #f9f9f7; flex-wrap: wrap; }
.back-btn { background: #fff; border: 0.5px solid #ddd; cursor: pointer; padding: 5px 13px; font-size: 13px; font-family: sans-serif; color: #666; border-radius: 6px; }
.back-btn:hover { background: #f5f5f5; }
.breadcrumb { font-size: 13px; color: #888; font-family: sans-serif; }
.breadcrumb span { color: #1a1a1a; font-weight: 500; }
.tab-row { margin-left: auto; display: flex; gap: 4px; }
.tab-btn { padding: 5px 14px; font-size: 13px; font-family: sans-serif; border: 0.5px solid #ddd; background: #fff; color: #666; border-radius: 6px; cursor: pointer; }
.tab-btn.active { background: #FAEEDA; color: #BA7517; border-color: #e8cfa0; font-weight: 500; }

.subview { display: none; }
.subview.active { display: block; }

/* READER */
.reader-wrap { display: flex; height: calc(100vh - 102px); }
.reader-toc { width: 200px; flex-shrink: 0; border-right: 0.5px solid #eee; overflow-y: auto; background: #f9f9f7; padding: 8px 0; }
.toc-item { display: block; width: 100%; text-align: left; padding: 6px 16px; font-size: 12px; font-family: sans-serif; border: none; background: transparent; color: #666; cursor: pointer; line-height: 1.5; }
.toc-item:hover { background: #f0ede8; }
.toc-item.active { background: #FAEEDA; color: #BA7517; }
.reader-main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #efece6; }
.reader-controls { padding: 9px 16px; display: flex; align-items: center; justify-content: center; gap: 14px; background: #fff; border-bottom: 0.5px solid #eee; }
.pg-btn { padding: 5px 16px; font-size: 13px; font-family: sans-serif; border: 0.5px solid #ddd; background: #fff; border-radius: 6px; cursor: pointer; color: #444; }
.pg-btn:hover { background: #f5f5f5; }
.pg-btn:disabled { opacity: 0.35; cursor: default; }
.pg-info { font-size: 13px; font-family: sans-serif; color: #666; min-width: 80px; text-align: center; }
.pg-jump { width: 52px; padding: 4px 8px; font-size: 13px; font-family: sans-serif; border: 0.5px solid #ddd; border-radius: 6px; text-align: center; outline: none; }
.reader-img-wrap { flex: 1; overflow-y: auto; display: flex; justify-content: center; padding: 16px; }
.reader-img { max-width: 100%; width: 760px; height: fit-content; box-shadow: 0 4px 24px rgba(0,0,0,0.12); border-radius: 4px; background: #fff; }

/* SEARCH */
.search-wrap { max-width: 760px; margin: 0 auto; padding: 28px 20px; }
.search-box-row { display: flex; gap: 8px; margin-bottom: 22px; }
.search-input { flex: 1; padding: 11px 16px; font-size: 15px; font-family: sans-serif; border: 0.5px solid #ccc; border-radius: 9px; outline: none; background: #fff; }
.search-input:focus { border-color: #BA7517; }
.search-btn { padding: 11px 22px; font-size: 14px; font-weight: 500; font-family: sans-serif; background: #BA7517; color: #fff; border: none; border-radius: 9px; cursor: pointer; }
.search-hint { font-size: 12px; font-family: sans-serif; color: #aaa; margin-bottom: 18px; }
.search-results { display: flex; flex-direction: column; gap: 10px; }
.result-card { display: flex; gap: 14px; align-items: center; background: #fff; border: 0.5px solid #e5e5e5; border-radius: 10px; padding: 13px 16px; cursor: pointer; transition: box-shadow 0.15s; }
.result-card:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.08); }
.result-thumb { width: 52px; height: 70px; object-fit: cover; border-radius: 4px; border: 0.5px solid #ddd; flex-shrink: 0; }
.result-info { font-family: sans-serif; }
.result-page { font-size: 14px; font-weight: 600; color: #BA7517; }
.result-snip { font-size: 12px; color: #888; margin-top: 3px; line-height: 1.5; }
.no-results { text-align: center; color: #aaa; font-family: sans-serif; font-size: 14px; padding: 40px 0; }

/* QUIZ */
.quiz-wrap { max-width: 680px; margin: 0 auto; padding: 28px 20px; }
.quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.quiz-progress { font-size: 13px; font-family: sans-serif; color: #888; }
.quiz-score { font-size: 13px; font-family: sans-serif; color: #3B6D11; font-weight: 600; }
.quiz-card { background: #fff; border: 0.5px solid #e5e5e5; border-radius: 14px; padding: 28px; }
.quiz-tag { display: inline-block; font-size: 11px; font-family: sans-serif; color: #BA7517; background: #FAEEDA; padding: 3px 10px; border-radius: 99px; margin-bottom: 14px; }
.quiz-q { font-size: 17px; font-weight: 600; line-height: 1.6; margin-bottom: 20px; }
.quiz-opts { display: flex; flex-direction: column; gap: 9px; }
.quiz-opt { text-align: left; padding: 12px 16px; font-size: 14px; font-family: sans-serif; border: 0.5px solid #ddd; background: #fafaf8; border-radius: 9px; cursor: pointer; line-height: 1.5; transition: all 0.12s; }
.quiz-opt:hover:not(:disabled) { border-color: #BA7517; background: #FDF8EF; }
.quiz-opt.correct { background: #EAF3DE; border-color: #8FBF5A; color: #3B6D11; font-weight: 600; }
.quiz-opt.wrong { background: #FDE9DC; border-color: #E89B72; color: #8B3A0F; }
.quiz-opt:disabled { cursor: default; }
.quiz-explain { margin-top: 18px; padding: 14px 16px; background: #FDF8EF; border-left: 3px solid #BA7517; border-radius: 0 8px 8px 0; font-size: 13.5px; font-family: sans-serif; line-height: 1.7; color: #555; display: none; }
.quiz-explain.show { display: block; }
.quiz-next { margin-top: 18px; width: 100%; padding: 12px 0; font-size: 14px; font-weight: 600; font-family: sans-serif; background: #BA7517; color: #fff; border: none; border-radius: 9px; cursor: pointer; display: none; }
.quiz-next.show { display: block; }
.quiz-done { text-align: center; padding: 40px 20px; }
.quiz-done-score { font-size: 44px; font-weight: 700; color: #BA7517; margin-bottom: 8px; }
.quiz-done-sub { font-size: 14px; font-family: sans-serif; color: #888; margin-bottom: 24px; }
.quiz-restart { padding: 11px 28px; font-size: 14px; font-weight: 600; font-family: sans-serif; background: #BA7517; color: #fff; border: none; border-radius: 9px; cursor: pointer; }

/* AI tip banner */
.ai-tip { max-width: 680px; margin: 14px auto 0; padding: 12px 18px; background: #E6F1FB; border: 0.5px solid #B5D4F4; border-radius: 10px; font-size: 12.5px; font-family: sans-serif; color: #185FA5; line-height: 1.7; }
.ai-tip a { color: #185FA5; font-weight: 600; }

/* COMING SOON */
.coming-soon { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 55vh; gap: 15px; text-align: center; padding: 40px; }
.cs-char { font-size: 90px; font-weight: 700; opacity: 0.05; line-height: 1; }
.cs-title { font-size: 22px; font-weight: 600; letter-spacing: 0.05em; }
.cs-sub { font-size: 14px; color: #888; font-family: sans-serif; line-height: 1.8; max-width: 360px; }
.cs-tag { font-size: 12px; font-family: sans-serif; border: 0.5px solid #ddd; color: #aaa; padding: 4px 14px; border-radius: 99px; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

@media (max-width: 720px) {
  .reader-toc { display: none; }
  .reader-img { width: 100%; }
  .tab-row { margin-left: 0; width: 100%; }
}
</style>
</head>
<body>

<nav class="site-nav">
  <div class="site-title" onclick="showHome()">倪師<span>學習網</span></div>

<div id="view-home" class="view active">

      <button class="tab-btn active" data-tab="reader" onclick="switchTab('reader')">📖 笔记阅读</button>

  <!-- SEARCH -->
  <div id="sub-search" class="subview">

<div id="view-soon" class="view">

  </div>

function buildGrid() {

  SUBJECTS.forEach(s => {

    card.className = 'subject-card' + (s.live ? '' : ' locked');

function showHome() { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById('view-home').classList.add('active'); }
function showSection(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById('view-' + id).classList.add('active'); }
function showSoon(s) {
  document.getElementById('soon-name').textContent = s.name;
  document.getElementById('soon-char').textContent = s.char;
  document.getElementById('soon-title').textContent = s.name;
  document.getElementById('soon-desc').textContent = s.soonDesc;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-soon').classList.add('active');
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.subview').forEach(v => v.classList.remove('active'));
  document.getElementById('sub-' + tab).classList.add('active');
}

/* READER */
let curPage = 1;
function buildToc() {
  const toc = document.getElementById('reader-toc');
  CHAPTERS.forEach(([pg, title]) => {
    const btn = document.createElement('button');
    btn.className = 'toc-item';
    btn.textContent = title;
    btn.dataset.page = pg;
    btn.onclick = () => gotoPage(pg);
    toc.appendChild(btn);
  });
}
function gotoPage(p) {
  if (p < 1 || p > 67) return;
  curPage = p;
  document.getElementById('reader-img').src = 'pages/' + String(p).padStart(2,'0') + '.jpg';
  document.getElementById('pg-jump').value = p;
  document.getElementById('prev-btn').disabled = p <= 1;
  document.getElementById('next-btn').disabled = p >= 67;
  // Highlight active TOC
  let active = null;
  document.querySelectorAll('.toc-item').forEach(b => {
    if (parseInt(b.dataset.page) <= p) active = b;
    b.classList.remove('active');
  });
  if (active) active.classList.add('active');
  document.querySelector('.reader-img-wrap').scrollTop = 0;
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('view-zhenjiu').classList.contains('active')) return;
  if (!document.getElementById('sub-reader').classList.contains('active')) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft') gotoPage(curPage - 1);
  if (e.key === 'ArrowRight') gotoPage(curPage + 1);
});

/* SEARCH */
function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  const box = document.getElementById('search-results');
  box.innerHTML = '';
  if (!q) return;
  const hits = [];
  for (const [pg, text] of Object.entries(SEARCH_INDEX)) {
    const idx = text.indexOf(q);
    if (idx >= 0) {
      const snip = text.substring(Math.max(0, idx-15), Math.min(text.length, idx+25));
      hits.push([parseInt(pg), snip]);
    }
  }
  if (hits.length === 0) {
    box.innerHTML = '<div class="no-results">没有找到「' + q + '」— OCR可能漏检图表文字，试试相关词或直接翻阅章节</div>';
    return;
  }
  hits.sort((a,b) => a[0]-b[0]);
  hits.forEach(([pg, snip]) => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `<img class="result-thumb" src="pages/${String(pg).padStart(2,'0')}.jpg" loading="lazy"><div class="result-info"><div class="result-page">第 ${pg} 页</div><div class="result-snip">…${snip}…</div></div>`;
    card.onclick = () => { switchTab('reader'); gotoPage(pg); };
    box.appendChild(card);
  });
}
document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

let quizOrder = [], quizIdx = 0, quizScore = 0;
function shuffleQuiz() {
  quizOrder = [...Array(QUIZ_BANK.length).keys()];
  for (let i = quizOrder.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [quizOrder[i], quizOrder[j]] = [quizOrder[j], quizOrder[i]];
  }
  quizIdx = 0; quizScore = 0;
  renderQuiz();
}
function renderQuiz() {
  const c = document.getElementById('quiz-container');
  document.getElementById('quiz-progress').textContent = `第 ${quizIdx+1} / ${QUIZ_BANK.length} 题`;
  document.getElementById('quiz-score').textContent = `得分 ${quizScore}`;
  if (quizIdx >= QUIZ_BANK.length) {
    const pct = Math.round(quizScore / QUIZ_BANK.length * 100);
    c.innerHTML = `<div class="quiz-card quiz-done"><div class="quiz-done-score">${quizScore} / ${QUIZ_BANK.length}</div><div class="quiz-done-sub">正确率 ${pct}%${pct >= 80 ? ' — 掌握扎实！' : pct >= 60 ? ' — 不错，再温习薄弱章节' : ' — 建议重读笔记后再测'}</div><button class="quiz-restart" onclick="shuffleQuiz()">重新测验</button></div>`;
    return;
  }
  const q = QUIZ_BANK[quizOrder[quizIdx]];
  c.innerHTML = `<div class="quiz-card"><div class="quiz-tag">${q.t}</div><div class="quiz-q">${q.q}</div><div class="quiz-opts">${q.o.map((o,i) => `<button class="quiz-opt" data-i="${i}" onclick="answerQuiz(${i})">${'ABCD'[i]}. ${o}</button>`).join('')}</div><div class="quiz-explain" id="quiz-explain">${q.e}</div><button class="quiz-next" id="quiz-next" onclick="nextQuiz()">下一题 →</button></div>`;
}

    btn.disabled = true;
    const bi = parseInt(btn.dataset.i);
    if (bi === q.a) btn.classList.add('correct');
    else if (bi === i) btn.classList.add('wrong');
  });
  if (i === q.a) { quizScore++; document.getElementById('quiz-score').textContent = `得分 ${quizScore}`; }
  document.getElementById('quiz-explain').classList.add('show');
  document.getElementById('quiz-next').classList.add('show');
}
function nextQuiz() { quizIdx++; renderQuiz(); }

buildGrid(); buildToc(); gotoPage(1); shuffleQuiz();
</script>
</body>
</html>
